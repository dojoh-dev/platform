name: CI Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install --frozen-lockfile

      - name: Test build
        run: pnpm build

      - name: Check format
        run: npx prettier --check '**/*.ts'

      - name: Lint code
        run: pnpm lint

      - name: Type check
        run: pnpm run check-types

      - name: Unit tests
        run: pnpm test
