name: Preview Teardown

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  REGION: us-central1
  REPO: platform-preview
  IMAGE: platform-preview
  PROJECT_ID: dojoh-dev

jobs:
  teardown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCR_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete Cloud Run Service
        run: |
          gcloud run services delete platform-preview-${{ github.event.pull_request.number }} --region ${{ env.REGION }} --quiet

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🧹 Preview no longer available"
